services:
  db:
    image: postgres:16-alpine
    container_name: gst_itc_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: gst_itc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gst_itc"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gst_itc_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgrespassword@db:5432/gst_itc
      - SECRET_KEY=supersecretkeythatisverysecureandlong12345
      - SEED_ADMIN_EMAIL=admin@gstitc.com
      - SEED_ADMIN_PASSWORD=adminpassword123
      - ENVIRONMENT=dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
